# =============================================================================
# Caller Workflow - Manual Vercel Deployment
# =============================================================================
# Source: Wamocon/github_workflow/examples/caller-production-deploy.yml
#
# Trigger : MANUAL ONLY - Actions tab → "Deploy to Vercel" → Run workflow
#           Choose "production" (live URL) or "preview" (test URL) at run time.
#           This workflow NEVER runs automatically.
#
# Secrets required:
#   - VERCEL_PROJECT_ID → add this to your repo's GitHub secrets
#                         (Vercel Project → Settings → General → Project ID)
#
# Already set at organisation level (no action needed):
#   - VERCEL_TOKEN   → personal Vercel access token
#   - VERCEL_ORG_ID  → Vercel personal account ID
#
# How it works:
#   Builds locally via Vercel CLI - Vercel never sees the GitHub repo owner,
#   so there are no "team seat" errors on a personal Hobby account in a GitHub org.
# =============================================================================

name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      db_schema:
        description: "Optional NEXT_PUBLIC_DB_SCHEMA override (leave empty to use Vercel env vars)"
        required: false
        type: string
        default: ""

jobs:
  deploy:
    name: Deploy - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install -g npm@11
          npm --version
          npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
